<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: sans-serif;
            background-color: #18181b; /* Dark background similar to the original */
            color: #f4f4f5;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background-color: #27272a;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        textarea {
            width: 100%;
            height: 100px;
            margin-bottom: 15px;
            padding: 10px;
            background-color: #3f3f46;
            color: white;
            border: 1px solid #52525b;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 15px;
            background-color: #52525b;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #71717a;
        }
        pre {
            background-color: #000;
            color: #fff;
            padding: 20px;
            overflow-x: auto;
            font-family: monospace;
            border-radius: 4px;
            min-height: 100px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Text to ASCII Art</h1>
        
        <label for="inputText">Input text:</label>
        <textarea id="inputText" placeholder="Type your message here...">BIRDS!</textarea>
        
        <div class="button-group">

        </div>

        <pre id="output">Loading custom font...</pre>

        figlet.parseFont('CustomFont', fontData);
        generateArt();

        function generateArt() {
            const text = document.getElementById('inputText').value;
            
            // If the input is empty, clear the output
            if (!text.trim()) {
                document.getElementById('output').textContent = '';
                return;
            }

            // 4. Use figlet to convert text using the newly loaded custom font
            figlet.text(text, {
                font: 'CustomFont',
            }, function(err, data) {
                if (err) {
                    document.getElementById('output').textContent = 'Error generating art.';
                    return;
                }
                document.getElementById('output').textContent = data;
            });
        }

        // Generate new art automatically when the user types
        document.getElementById('inputText').addEventListener('input', generateArt);

        // Handle the Copy to Clipboard button
        document.getElementById('copyBtn').addEventListener('click', () => {
            const outputText = document.getElementById('output').textContent;
            navigator.clipboard.writeText(outputText);
        });
    </script>
